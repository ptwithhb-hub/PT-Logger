<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PT Logger</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --font-sans: system-ui, sans-serif;
  --font-mono: ui-monospace, monospace;
  --color-background-primary: #ffffff;
  --color-background-secondary: #f5f5f5;
  --color-text-primary: #111111;
  --color-text-secondary: #555555;
  --color-text-tertiary: #999999;
  --color-border-tertiary: rgba(0,0,0,0.1);
  --color-border-secondary: rgba(0,0,0,0.18);
  --color-border-primary: rgba(0,0,0,0.3);
  --border-radius-md: 8px;
  --border-radius-lg: 12px;
}
@media (prefers-color-scheme: dark){
  :root{
    --color-background-primary: #1a1a1a;
    --color-background-secondary: #242424;
    --color-text-primary: #f0f0f0;
    --color-text-secondary: #999999;
    --color-text-tertiary: #555555;
    --color-border-tertiary: rgba(255,255,255,0.08);
    --color-border-secondary: rgba(255,255,255,0.14);
    --color-border-primary: rgba(255,255,255,0.25);
  }
}
html,body{height:100%;background:var(--color-background-secondary);color:var(--color-text-primary);font-family:var(--font-sans);}
#app{max-width:480px;margin:0 auto;height:100vh;display:flex;flex-direction:column;overflow:hidden;background:var(--color-background-primary);}
.screen{display:none;flex-direction:column;height:100%;overflow:hidden;}
.screen.active{display:flex;}
.hdr{padding:52px 16px 10px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.hdr-title{font-size:17px;font-weight:500;color:var(--color-text-primary);}
.hdr-sub{font-size:11px;color:var(--color-text-tertiary);margin-top:1px;font-variant-numeric:tabular-nums;}
.scroll{flex:1;overflow-y:auto;padding:12px 14px 24px;-webkit-overflow-scrolling:touch;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:8px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);font-size:13px;cursor:pointer;transition:background 0.15s;font-family:var(--font-sans);}
.btn:hover{background:var(--color-background-secondary);}
.btn-green{background:#c8f060;color:#2a4a00;border-color:transparent;font-weight:500;}
.btn-green:hover{opacity:0.88;}
.btn-red{color:#c0392b;border-color:rgba(192,57,43,0.3);}
.btn-red:hover{background:rgba(192,57,43,0.08);}
.btn-ghost{border-color:transparent;color:var(--color-text-secondary);}
.btn-full{width:100%;}
.add-form{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:12px;margin-bottom:12px;display:none;}
.add-form input{width:100%;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:9px 12px;color:var(--color-text-primary);font-size:14px;margin-bottom:10px;outline:none;font-family:var(--font-sans);}
.add-form input:focus{border-color:var(--color-border-primary);}
.client-card{display:flex;align-items:center;gap:12px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:11px 13px;margin-bottom:8px;cursor:pointer;}
.client-card:hover{border-color:var(--color-border-secondary);background:var(--color-background-secondary);}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0;}
.client-info{flex:1;min-width:0;}
.client-name{font-size:15px;font-weight:500;color:var(--color-text-primary);}
.client-sub{font-size:11px;color:var(--color-text-tertiary);margin-top:1px;}
.back-btn{background:none;border:none;color:var(--color-text-secondary);font-size:13px;cursor:pointer;padding:0;display:flex;align-items:center;gap:4px;font-family:var(--font-sans);}
.back-btn:hover{color:var(--color-text-primary);}
.tabs{display:flex;border-bottom:0.5px solid var(--color-border-tertiary);flex-shrink:0;padding:0 14px;}
.tab{padding:9px 14px;font-size:13px;color:var(--color-text-secondary);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font-sans);transition:color 0.15s;}
.tab.active{color:var(--color-text-primary);border-bottom-color:var(--color-text-primary);font-weight:500;}
.tab-content{flex:1;overflow-y:auto;padding:14px 14px 24px;-webkit-overflow-scrolling:touch;}
.mic-wrap{display:flex;flex-direction:column;align-items:center;padding:6px 0 14px;}
.mic-btn{width:68px;height:68px;border-radius:50%;background:var(--color-background-primary);border:1.5px solid var(--color-border-secondary);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;margin-bottom:8px;}
.mic-btn:hover{background:var(--color-background-secondary);}
.mic-btn.listening{border-color:#e74c3c;background:rgba(231,76,60,0.08);animation:mpulse 1.3s ease-in-out infinite;}
.mic-btn.listening path{fill:#e74c3c!important;}
@keyframes mpulse{0%,100%{box-shadow:0 0 0 0 rgba(231,76,60,0.25)}60%{box-shadow:0 0 0 14px rgba(231,76,60,0)}}
.mic-status{font-size:12px;color:var(--color-text-secondary);text-align:center;}
.mic-hint{font-size:11px;color:var(--color-text-tertiary);text-align:center;margin-top:3px;}
.transcript{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:8px 12px;font-size:12px;color:var(--color-text-secondary);font-style:italic;min-height:30px;margin-top:10px;margin-bottom:12px;}
.manual-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;margin-bottom:8px;user-select:none;}
.manual-toggle span{font-size:12px;color:var(--color-text-secondary);}
.arr{font-size:10px;color:var(--color-text-tertiary);transition:transform 0.2s;display:inline-block;}
.manual-toggle.open .arr{transform:rotate(90deg);}
.manual-form{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:12px;margin-bottom:12px;display:none;}
.manual-form.open{display:block;}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.ffield{display:flex;flex-direction:column;gap:3px;}
.ffield.full{grid-column:1/-1;}
.flabel{font-size:10px;color:var(--color-text-tertiary);letter-spacing:0.05em;text-transform:uppercase;}
.finput{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:8px 10px;color:var(--color-text-primary);font-size:14px;outline:none;width:100%;font-family:var(--font-sans);}
.finput:focus{border-color:var(--color-border-primary);}
.ac-wrap{position:relative;width:100%;}
.ac-list{position:absolute;top:100%;left:0;right:0;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);z-index:100;max-height:160px;overflow-y:auto;margin-top:3px;box-shadow:0 4px 16px rgba(0,0,0,0.10);display:none;}
.ac-item{padding:9px 12px;font-size:13px;cursor:pointer;color:var(--color-text-primary);border-bottom:0.5px solid var(--color-border-tertiary);}
.ac-item:last-child{border-bottom:none;}
.ac-item:hover,.ac-item.hi{background:var(--color-background-secondary);}
.stepper{display:flex;align-items:center;}
.sbtn{width:34px;height:34px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sbtn:first-child{border-radius:var(--border-radius-md) 0 0 var(--border-radius-md);border-right:none;}
.sbtn:last-child{border-radius:0 var(--border-radius-md) var(--border-radius-md) 0;border-left:none;}
.sbtn:hover{background:var(--color-background-secondary);}
.sval{flex:1;text-align:center;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-left:none;border-right:none;padding:8px 4px;font-size:15px;color:var(--color-text-primary);}
.log-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.slabel{font-size:10px;color:var(--color-text-tertiary);letter-spacing:0.06em;text-transform:uppercase;}
.log-wrap{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);overflow:hidden;}
.log-row{display:grid;grid-template-columns:20px 1fr 56px 30px 36px 28px;align-items:center;gap:4px;padding:8px 10px;border-bottom:0.5px solid var(--color-border-tertiary);font-size:12px;}
.log-row:last-child{border-bottom:none;}
.log-row.lhdr span{font-size:10px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.04em;}
.log-num{color:var(--color-text-tertiary);}
.log-ex{font-weight:500;color:var(--color-text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.log-val{color:var(--color-text-secondary);text-align:center;}
.log-del{background:none;border:none;color:var(--color-text-tertiary);font-size:12px;cursor:pointer;padding:2px 4px;border-radius:4px;}
.log-del:hover{color:#c0392b;background:rgba(192,57,43,0.08);}
.empty{text-align:center;padding:24px;color:var(--color-text-tertiary);font-size:12px;}
.hist-session{margin-bottom:14px;}
.hist-date{font-size:10px;color:var(--color-text-tertiary);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:5px;}
.hist-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);overflow:hidden;}
.hist-row{display:grid;grid-template-columns:1fr 54px 30px 36px;gap:4px;padding:7px 10px;border-bottom:0.5px solid var(--color-border-tertiary);font-size:12px;align-items:center;}
.hist-row:last-child{border-bottom:none;}
.hist-ex{font-weight:500;color:var(--color-text-primary);}
.hist-val{color:var(--color-text-secondary);text-align:center;}
.imp-textarea{width:100%;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 12px;color:var(--color-text-primary);font-size:12px;line-height:1.7;resize:none;outline:none;min-height:160px;font-family:var(--font-mono);}
.imp-textarea:focus{border-color:var(--color-border-primary);}
.imp-preview{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);overflow:hidden;margin-top:10px;}
.imp-row{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;border-bottom:0.5px solid var(--color-border-tertiary);font-size:12px;}
.imp-row:last-child{border-bottom:none;}
.imp-result{font-size:12px;padding:9px 12px;border-radius:var(--border-radius-md);margin-top:8px;display:none;}
.imp-result.ok{background:rgba(200,240,96,0.12);color:#3a6000;border:0.5px solid rgba(200,240,96,0.4);}
.imp-result.err{background:rgba(192,57,43,0.08);color:#c0392b;border:0.5px solid rgba(192,57,43,0.2);}
</style>
</head>
<body>
<div id="app">

<!-- CLIENTS -->
<div id="sc-clients" class="screen active">
  <div class="hdr">
    <div><div class="hdr-title">PT Logger</div><div class="hdr-sub">your clients</div></div>
    <button class="btn btn-green" id="show-add">+ Add client</button>
  </div>
  <div class="scroll">
    <div class="add-form" id="add-form">
      <input id="new-name" type="text" placeholder="Client name..." maxlength="40"/>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-green" id="save-client" style="flex:1">Save</button>
        <button class="btn btn-ghost" id="cancel-add">Cancel</button>
      </div>
    </div>
    <div id="client-list"></div>
    <div id="no-clients" style="display:none" class="empty">No clients yet — add one above</div>
  </div>
</div>

<!-- IMPORT -->
<div id="sc-import" class="screen">
  <div class="hdr">
    <div><button class="back-btn" id="imp-back">‹ Clients</button><div class="hdr-title" id="imp-title" style="margin-top:4px;"></div></div>
  </div>
  <div class="scroll">
    <div class="slabel" style="margin-bottom:6px;">Paste Apple Note below</div>
    <textarea class="imp-textarea" id="imp-textarea" placeholder="20.03.26&#10;&#10;Leg extension&#10;Set 1: 10 (40kg)&#10;Set 2: 10 (40kg)&#10;&#10;Trap bar deadlifts&#10;Set 1: 12 (55kg)..."></textarea>
    <div style="display:flex;gap:8px;margin-top:8px;">
      <button class="btn" id="imp-preview-btn" style="flex:1;">Preview</button>
      <button class="btn btn-green" id="imp-save-btn" style="flex:1;display:none;">Save session</button>
    </div>
    <div class="imp-result" id="imp-result"></div>
    <div class="imp-preview" id="imp-preview" style="display:none;"></div>
  </div>
</div>

<!-- SESSION -->
<div id="sc-session" class="screen">
  <div class="hdr">
    <div>
      <button class="back-btn" id="back-btn">‹ Clients</button>
      <div style="display:flex;align-items:center;gap:10px;margin-top:4px;">
        <div id="sess-avatar" class="avatar" style="width:32px;height:32px;font-size:12px;"></div>
        <div><div class="hdr-title" id="sess-name"></div><div class="hdr-sub" id="sess-date"></div></div>
      </div>
    </div>
    <button class="btn btn-ghost" id="export-btn" style="width:34px;height:34px;padding:0;border-radius:50%;" title="Export CSV">
      <svg width="16" height="16" viewBox="0 0 24 24"><path d="M12 16l-4-4h3V4h2v8h3l-4 4zm-7 4v-2h14v2H5z" fill="currentColor"/></svg>
    </button>
  </div>
  <div class="tabs">
    <button class="tab active" data-tab="log">Session</button>
    <button class="tab" data-tab="history">History</button>
  </div>
  <div class="tab-content" id="tab-log">
    <div class="mic-wrap">
      <button class="mic-btn" id="mic-btn">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3zm-1 3a1 1 0 0 1 2 0v8a1 1 0 0 1-2 0V4zM7 11a5 5 0 0 0 10 0h2a7 7 0 0 1-6 6.93V21h2v2H9v-2h2v-3.07A7 7 0 0 1 5 11h2z" fill="#888"/>
        </svg>
      </button>
      <div class="mic-status" id="mic-status">Tap mic and speak</div>
      <div class="mic-hint">"bench press · 80kg · 3 sets of 10"</div>
    </div>
    <div class="transcript" id="transcript">waiting for voice input...</div>
    <div class="manual-toggle" id="manual-toggle"><span class="arr">›</span><span>Manual entry</span></div>
    <div class="manual-form" id="manual-form">
      <div class="fgrid">
        <div class="ffield full"><div class="flabel">Exercise</div><div class="ac-wrap"><input class="finput" id="m-ex" type="text" placeholder="e.g. Bench Press" autocomplete="off"/><div class="ac-list" id="ac-list"></div></div></div>
        <div class="ffield"><div class="flabel">Weight (kg)</div><input class="finput" id="m-wt" type="number" placeholder="0" inputmode="decimal"/></div>
        <div class="ffield"><div class="flabel">Sets</div><div class="stepper"><button class="sbtn" id="s-dn">−</button><div class="sval" id="s-val">3</div><button class="sbtn" id="s-up">+</button></div></div>
        <div class="ffield"><div class="flabel">Reps</div><div class="stepper"><button class="sbtn" id="r-dn">−</button><div class="sval" id="r-val">10</div><button class="sbtn" id="r-up">+</button></div></div>
      </div>
      <button class="btn btn-green btn-full" id="manual-log-btn">Log set</button>
    </div>
    <div class="log-hdr"><span class="slabel">Today's log</span><button class="btn btn-red" id="clear-btn" style="padding:5px 10px;font-size:11px;">Clear</button></div>
    <div class="log-wrap">
      <div class="log-row lhdr"><span></span><span>Exercise</span><span style="text-align:center">Wt</span><span style="text-align:center">Sets</span><span style="text-align:center">Reps</span><span></span></div>
      <div id="log-body"></div>
    </div>
  </div>
  <div class="tab-content" id="tab-history" style="display:none;"><div id="history-content"></div></div>
</div>

</div>
<script>
const COLORS=[{bg:'#e8f5e9',tx:'#1b5e20'},{bg:'#e3f2fd',tx:'#0d47a1'},{bg:'#fce4ec',tx:'#880e4f'},{bg:'#fff8e1',tx:'#e65100'},{bg:'#f3e5f5',tx:'#4a148c'},{bg:'#e0f7fa',tx:'#006064'}];
function colorFor(n){let h=0;for(let c of n)h=(h*31+c.charCodeAt(0))&0xffff;return COLORS[h%COLORS.length];}
function initials(n){return n.trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function pad(n){return String(n).padStart(2,'0');}
function todayKey(){const d=new Date();return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function fmtDate(k){const[y,m,d]=k.split('-');const mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return `${parseInt(d)} ${mn[parseInt(m)-1]} ${y}`;}
function nowTime(){return new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});}

function lsget(k){try{return JSON.parse(localStorage.getItem(k));}catch{return null;}}
function lsset(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

let clients=lsget('pt_clients')||[],currentClient=null,entries=[],entryId=0,listening=false,recognition=null,setsVal=3,repsVal=10,importClient=null,importParsed=null;

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('sc-'+id).classList.add('active');}

function renderClients(){
  const list=document.getElementById('client-list');
  const empty=document.getElementById('no-clients');
  if(!clients.length){list.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  list.innerHTML=clients.map(c=>{
    const col=colorFor(c.name);
    const h=lsget('pt_h_'+c.id)||{};
    const sessions=Object.keys(h).length;
    const last=sessions?fmtDate(Object.keys(h).sort().pop()):null;
    return `<div class="client-card" onclick="openClient('${c.id}')">
      <div class="avatar" style="background:${col.bg};color:${col.tx}">${initials(c.name)}</div>
      <div class="client-info"><div class="client-name">${c.name}</div><div class="client-sub">${sessions} session${sessions!==1?'s':''}${last?' · '+last:''}</div></div>
      <button class="btn btn-ghost" style="font-size:11px;padding:5px 9px;flex-shrink:0;" onclick="event.stopPropagation();openImport('${c.id}')">Import</button>
      <span style="color:#ccc;font-size:18px;">›</span>
    </div>`;
  }).join('');
}

document.getElementById('show-add').onclick=()=>{document.getElementById('add-form').style.display='block';document.getElementById('new-name').focus();};
document.getElementById('cancel-add').onclick=()=>{document.getElementById('add-form').style.display='none';document.getElementById('new-name').value='';};
document.getElementById('save-client').onclick=saveClient;
document.getElementById('new-name').addEventListener('keydown',e=>{if(e.key==='Enter')saveClient();});
function saveClient(){
  const name=document.getElementById('new-name').value.trim();
  if(!name)return;
  clients.push({id:'c_'+Date.now(),name});lsset('pt_clients',clients);
  document.getElementById('add-form').style.display='none';document.getElementById('new-name').value='';renderClients();
}

window.openClient=function(id){
  currentClient=clients.find(c=>c.id===id);if(!currentClient)return;
  const col=colorFor(currentClient.name);
  const av=document.getElementById('sess-avatar');
  av.style.background=col.bg;av.style.color=col.tx;av.textContent=initials(currentClient.name);
  document.getElementById('sess-name').textContent=currentClient.name;
  document.getElementById('sess-date').textContent=fmtDate(todayKey());
  const h=lsget('pt_h_'+currentClient.id)||{};
  entries=(h[todayKey()]||[]).map(e=>({...e}));
  entryId=entries.length?Math.max(...entries.map(e=>e.id)):0;
  seedLibraryFromHistory(currentClient.id);
  switchTab('log');renderLog();showScreen('session');
};

document.getElementById('back-btn').onclick=()=>{if(recognition&&listening)recognition.stop();showScreen('clients');renderClients();};
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>switchTab(t.dataset.tab));
function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===name));
  document.getElementById('tab-log').style.display=name==='log'?'block':'none';
  document.getElementById('tab-history').style.display=name==='history'?'block':'none';
  if(name==='history')renderHistory();
}

const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(SR){
  recognition=new SR();recognition.continuous=false;recognition.interimResults=true;recognition.lang='en-GB';
  recognition.onstart=()=>{listening=true;document.getElementById('mic-btn').classList.add('listening');document.getElementById('mic-status').textContent='Listening...';document.getElementById('transcript').textContent='';};
  recognition.onresult=e=>{let i='',f='';for(let x=e.resultIndex;x<e.results.length;x++){if(e.results[x].isFinal)f+=e.results[x][0].transcript;else i+=e.results[x][0].transcript;}document.getElementById('transcript').textContent=f||i||'...';if(f)parseAndLog(f.trim());};
  recognition.onerror=e=>{document.getElementById('mic-status').textContent=e.error==='no-speech'?'No speech — tap again':'Mic error: '+e.error;stopListening();};
  recognition.onend=stopListening;
}
function stopListening(){listening=false;document.getElementById('mic-btn').classList.remove('listening');document.getElementById('mic-status').textContent='Tap mic and speak';}
document.getElementById('mic-btn').onclick=()=>{
  if(!SR){alert('Use Manual entry below — voice not available in this browser.');return;}
  if(listening){recognition.stop();return;}try{recognition.start();}catch(e){}
};

function parseAndLog(raw){
  const t=raw.toLowerCase().replace(/[,\.!?]/g,' ').replace(/\s+/g,' ').trim();
  let weight=null,reps=null,sets=null;
  const wM=t.match(/(\d+\.?\d*)\s*(?:kg|kilo|kilos|kilogram|kilograms|pound|pounds|lbs?)/i);if(wM)weight=wM[1]+(/lb|pound/i.test(wM[0])?'lb':'kg');
  const rM=t.match(/(\d+)\s*(?:reps?|repetitions?)/i);if(rM)reps=rM[1];
  const sM=t.match(/(\d+)\s*sets?/i);if(sM)sets=sM[1];
  const sxM=t.match(/(\d+)\s*[x×]\s*(\d+)/i);if(sxM){sets=sxM[1];if(!reps)reps=sxM[2];}
  const soM=t.match(/(\d+)\s*sets?\s+of\s+(\d+)/i);if(soM){sets=soM[1];if(!reps)reps=soM[2];}
  let exercise=raw.replace(/\d+\.?\d*\s*(?:kg|kilo|kilos|kilogram|kilograms|pounds?|lbs?)/gi,'').replace(/\d+\s*(?:reps?|repetitions?|sets?)/gi,'').replace(/\d+\s*[x×]\s*\d+/gi,'').replace(/sets?\s+of\s+\d+/gi,'').replace(/\b(?:do|did|for|and|of|at|with|x)\b/gi,'').replace(/[,\.!?]/g,' ').replace(/\s+/g,' ').trim();
  if(!exercise)exercise=raw;
  addEntry({exercise,weight:weight||'—',sets:sets||'1',reps:reps||'—'});
  document.getElementById('mic-status').textContent='Logged! Tap to add more.';
}

document.getElementById('manual-toggle').onclick=function(){this.classList.toggle('open');document.getElementById('manual-form').classList.toggle('open');};
function stepper(id,d,min){const el=document.getElementById(id);let v=parseInt(el.textContent)+d;if(v<min)v=min;el.textContent=v;if(id==='s-val')setsVal=v;else repsVal=v;}
document.getElementById('s-up').onclick=()=>stepper('s-val',1,1);
document.getElementById('s-dn').onclick=()=>stepper('s-val',-1,1);
document.getElementById('r-up').onclick=()=>stepper('r-val',1,1);
document.getElementById('r-dn').onclick=()=>stepper('r-val',-1,1);
document.getElementById('manual-log-btn').onclick=()=>{
  const ex=document.getElementById('m-ex').value.trim();
  const wt=document.getElementById('m-wt').value.trim();
  if(!ex){document.getElementById('m-ex').focus();return;}
  addEntry({exercise:ex,weight:wt?wt+'kg':'—',sets:String(setsVal),reps:String(repsVal)});
  document.getElementById('m-ex').value='';document.getElementById('m-wt').value='';
};

function addEntry(data){
  const entry={id:++entryId,...data,ts:nowTime()};
  entries.push(entry);
  const h=lsget('pt_h_'+currentClient.id)||{};
  h[todayKey()]=entries;lsset('pt_h_'+currentClient.id,h);
  saveToLibrary(data.exercise);
  renderLog();
}

// ── EXERCISE LIBRARY
function getLibrary(){return lsget('pt_exlib')||[];}
function saveToLibrary(name){
  if(!name||name==='—')return;
  const clean=name.trim();
  let lib=getLibrary();
  const idx=lib.findIndex(e=>e.toLowerCase()===clean.toLowerCase());
  if(idx===-1)lib.unshift(clean);
  else{lib.splice(idx,1);lib.unshift(clean);}
  if(lib.length>200)lib=lib.slice(0,200);
  lsset('pt_exlib',lib);
}
// Also seed library from imported history
function seedLibraryFromHistory(clientId){
  const h=lsget('pt_h_'+clientId)||{};
  Object.values(h).forEach(sess=>sess.forEach(e=>saveToLibrary(e.exercise)));
}

// ── AUTOCOMPLETE
let acIdx=-1;
const exInput=document.getElementById('m-ex');
const acList=document.getElementById('ac-list');

exInput.addEventListener('input',()=>{
  const val=exInput.value.trim();
  if(!val){acList.style.display='none';return;}
  const lib=getLibrary();
  const matches=lib.filter(e=>e.toLowerCase().includes(val.toLowerCase())).slice(0,8);
  if(!matches.length){acList.style.display='none';return;}
  acIdx=-1;
  acList.innerHTML=matches.map(m=>`<div class="ac-item" onmousedown="pickAc('${m.replace(/'/g,"\\'")}')"> ${m}</div>`).join('');
  acList.style.display='block';
});

exInput.addEventListener('keydown',e=>{
  const items=acList.querySelectorAll('.ac-item');
  if(!items.length)return;
  if(e.key==='ArrowDown'){e.preventDefault();acIdx=Math.min(acIdx+1,items.length-1);items.forEach((el,i)=>el.classList.toggle('hi',i===acIdx));}
  else if(e.key==='ArrowUp'){e.preventDefault();acIdx=Math.max(acIdx-1,0);items.forEach((el,i)=>el.classList.toggle('hi',i===acIdx));}
  else if(e.key==='Enter'&&acIdx>=0){e.preventDefault();exInput.value=items[acIdx].textContent.trim();acList.style.display='none';acIdx=-1;}
  else if(e.key==='Escape'){acList.style.display='none';acIdx=-1;}
});

document.addEventListener('click',e=>{if(!e.target.closest('.ac-wrap'))acList.style.display='none';});

window.pickAc=function(val){exInput.value=val;acList.style.display='none';acIdx=-1;document.getElementById('m-wt').focus();};

function renderLog(){
  const body=document.getElementById('log-body');
  if(!entries.length){body.innerHTML='<div class="empty">No sets logged yet</div>';return;}
  body.innerHTML=entries.map((e,i)=>`<div class="log-row"><span class="log-num">${i+1}</span><span class="log-ex">${e.exercise}</span><span class="log-val">${e.weight}</span><span class="log-val">${e.sets}</span><span class="log-val">${e.reps}</span><button class="log-del" onclick="delEntry(${e.id})">✕</button></div>`).join('');
}
window.delEntry=id=>{entries=entries.filter(e=>e.id!==id);const h=lsget('pt_h_'+currentClient.id)||{};h[todayKey()]=entries;lsset('pt_h_'+currentClient.id,h);renderLog();};
document.getElementById('clear-btn').onclick=()=>{
  if(!entries.length)return;
  if(confirm('Clear today\'s session for '+currentClient.name+'?')){
    entries=[];entryId=0;const h=lsget('pt_h_'+currentClient.id)||{};delete h[todayKey()];lsset('pt_h_'+currentClient.id,h);renderLog();document.getElementById('transcript').textContent='waiting for voice input...';
  }
};

function renderHistory(){
  const h=lsget('pt_h_'+currentClient.id)||{};
  const keys=Object.keys(h).sort().reverse();
  const el=document.getElementById('history-content');
  if(!keys.length){el.innerHTML='<div class="empty">No previous sessions yet</div>';return;}
  el.innerHTML=keys.map(k=>`<div class="hist-session"><div class="hist-date">${fmtDate(k)}</div><div class="hist-card">${h[k].map(e=>`<div class="hist-row"><span class="hist-ex">${e.exercise}</span><span class="hist-val">${e.weight}</span><span class="hist-val">${e.sets}s</span><span class="hist-val">${e.reps}r</span></div>`).join('')}</div></div>`).join('');
}

document.getElementById('export-btn').onclick=()=>{
  const h=lsget('pt_h_'+currentClient.id)||{};
  let csv=`Client: ${currentClient.name}\nExported: ${new Date().toLocaleDateString('en-GB')}\n\nDate,Exercise,Weight,Sets,Reps,Time\n`;
  Object.keys(h).sort().forEach(date=>{h[date].forEach(e=>{csv+=`${date},"${e.exercise}","${e.weight}","${e.sets}","${e.reps}","${e.ts||''}"\n`;});});
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=`${currentClient.name.replace(/\s+/g,'_')}_log.csv`;a.click();
};

window.openImport=function(id){
  importClient=clients.find(c=>c.id===id);if(!importClient)return;
  document.getElementById('imp-title').textContent=importClient.name;
  document.getElementById('imp-textarea').value='';
  document.getElementById('imp-preview').style.display='none';
  document.getElementById('imp-preview').innerHTML='';
  document.getElementById('imp-save-btn').style.display='none';
  document.getElementById('imp-result').style.display='none';
  importParsed=null;showScreen('import');
};
document.getElementById('imp-back').onclick=()=>{showScreen('clients');renderClients();};

function parseNote(text){
  const lines=text.split('\n').map(l=>l.trim()).filter(l=>l.length);
  let dateKey=todayKey();
  const dM=lines[0].match(/^(\d{1,2})[.\-\/](\d{1,2})[.\-\/](\d{2,4})$/);
  if(dM){let y=parseInt(dM[3]);if(y<100)y+=2000;dateKey=`${y}-${pad(parseInt(dM[2]))}-${pad(parseInt(dM[1]))}`;}
  const exercises=[];let cur=null;
  for(let i=(dM?1:0);i<lines.length;i++){
    const l=lines[i];
    const sM=l.match(/^set\s*\d+\s*:\s*(\d+)\s*(?:\((\d+\.?\d*)\s*kg?\)|\((\d+\.?\d*)\s*lb\)|(\d+\.?\d*)\s*kg)/i);
    if(sM){const reps=sM[1];const weight=sM[2]?sM[2]+'kg':sM[3]?sM[3]+'lb':sM[4]?sM[4]+'kg':'—';if(cur)cur.sets.push({reps,weight});continue;}
    if(!/^\d+$/.test(l)){cur={name:l,sets:[]};exercises.push(cur);}
  }
  let id=0;const ents=[];
  exercises.forEach(ex=>ex.sets.forEach((s,si)=>ents.push({id:++id,exercise:ex.name,weight:s.weight,sets:String(si+1),reps:s.reps,ts:'--'})));
  return{dateKey,exercises,entries:ents};
}

document.getElementById('imp-preview-btn').onclick=()=>{
  const text=document.getElementById('imp-textarea').value.trim();
  const res=document.getElementById('imp-result');
  const prev=document.getElementById('imp-preview');
  const saveBtn=document.getElementById('imp-save-btn');
  if(!text){res.className='imp-result err';res.style.display='block';res.textContent='Paste a session note first.';return;}
  try{
    importParsed=parseNote(text);
    if(!importParsed.exercises.length){res.className='imp-result err';res.style.display='block';res.textContent='No exercises found — check format has "Set 1: 10 (40kg)"';saveBtn.style.display='none';prev.style.display='none';return;}
    res.style.display='none';prev.style.display='block';
    prev.innerHTML=`<div class="imp-row" style="background:var(--color-background-secondary);"><span style="font-size:10px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.05em;">Date detected</span><span style="font-size:12px;font-weight:500;">${fmtDate(importParsed.dateKey)}</span></div>${importParsed.exercises.map(ex=>`<div class="imp-row"><span style="font-weight:500;font-size:13px;">${ex.name}</span><span style="font-size:11px;color:var(--color-text-secondary);">${ex.sets.length} sets · ${ex.sets.map(s=>s.reps+'@'+s.weight).join(', ')}</span></div>`).join('')}`;
    saveBtn.style.display='flex';
  }catch(e){res.className='imp-result err';res.style.display='block';res.textContent='Could not parse: '+e.message;}
};

document.getElementById('imp-save-btn').onclick=()=>{
  if(!importParsed||!importClient)return;
  const h=lsget('pt_h_'+importClient.id)||{};
  const existing=h[importParsed.dateKey]||[];
  const maxId=existing.length?Math.max(...existing.map(e=>e.id)):0;
  const newE=importParsed.entries.map((e,i)=>({...e,id:maxId+i+1}));
  h[importParsed.dateKey]=[...existing,...newE];
  lsset('pt_h_'+importClient.id,h);
  const res=document.getElementById('imp-result');
  res.className='imp-result ok';res.style.display='block';
  res.textContent=`Saved — ${importParsed.exercises.length} exercises on ${fmtDate(importParsed.dateKey)}`;
  document.getElementById('imp-save-btn').style.display='none';
  document.getElementById('imp-textarea').value='';
  document.getElementById('imp-preview').style.display='none';
  importParsed=null;
};

renderClients();
</script>
